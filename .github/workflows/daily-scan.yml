name: Daily scan

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python3 analysis.py

      - name: Update report and state
        run: python3 compare.py

      - name: Commit and push if changed
        run: |
          git config user.name "invest-agent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data.json analysis_result.csv state_previous_run.csv last_run.txt
          git add latest_report.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Daily scan $(date -u +%Y-%m-%d)"
          git push
